experiment:
  name: lora_r2
  mode: lora

model:
  name: prajjwal1/bert-tiny
  num_labels: 2

dataset:
  name: glue
  subset: sst2
  text_column: sentence
  label_column: label
  train_split: train
  eval_split: validation
  max_length: 128
  train_subset: 5000
  eval_subset: 1000
  fallback_to_toy: true

lora:
  rank: 2
  alpha: 4
  dropout: 0.05
  target_modules: [query, value, q_lin, v_lin]
  inject_all_linear: false

training:
  seed: 42
  prefer_cuda: true
  epochs: 3
  batch_size: 16
  learning_rate: 0.0005
  weight_decay: 0.0

output_dir: results/runs
